<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h2>Add Expense</h2>

    <form method="POST">

        <input
        type="text"
        name="category"
        placeholder="Category (Food, Travel, Shopping...)"
        required>

        <input
        type="number"
        step="0.01"
        name="amount"
        placeholder="Amount"
        required>

        <input
        type="text"
        name="description"
        placeholder="Description">

        <input
        type="date"
        name="date"
        required>

        <button type="submit">
            Save Expense
        </button>

    </form>

    <br>

    <a href="/dashboard">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
