<!DOCTYPE html>
<html>
<head>
    <title>Monthly Expense Report</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

<h1>Monthly Expense Report</h1>

<table>

<tr>
    <th>Month</th>
    <th>Total Expense</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>₹{{ row[1] }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard" class="menu-card logout">
    Back Dashboard
</a>

</div>

</body>
</html>
