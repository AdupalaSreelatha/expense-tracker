<!DOCTYPE html>
<html>
<head>
    <title>Expense History</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="dashboard">

<h1>Expense History</h1>

<table>

    <tr>
        <th>Category</th>
        <th>Amount</th>
        <th>Description</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>

    {% for e in expenses %}

    <tr>

        <td>{{ e[2] }}</td>
        <td>₹{{ e[3] }}</td>
        <td>{{ e[4] }}</td>
        <td>{{ e[5] }}</td>

        <td>

            <a href="/edit_expense/{{ e[0] }}">
                ✏️ Edit
            </a>

            |

            <a href="/delete_expense/{{ e[0] }}"
               onclick="return confirm('Are you sure you want to delete this expense?')">
                🗑️ Delete
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

<br>

<div class="nav-links">

    <a href="/dashboard">
        Dashboard
    </a>

    <a href="/add_expense">
        Add Expense
    </a>

</div>


</div>

</body>
</html>
